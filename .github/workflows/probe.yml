name: iran-reference-probe

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write   # we commit the refreshed JSON back to the repo

concurrency:
  group: iran-reference-probe
  cancel-in-progress: false

jobs:
  probe:
    runs-on: self-hosted
    timeout-minutes: 8

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      # Skip actions/setup-python on self-hosted macOS/Linux: it often tries to
      # create /Users/runner/... paths from GitHub-hosted images and exits with
      # "mkdir: ... Permission denied". We use whichever Python ≥3.10 is on PATH.
      - name: Resolve Python (self-hosted)
        id: py
        shell: bash
        run: |
          set -euo pipefail
          for cand in python3.12 python3.11 python3.10 python3; do
            if command -v "$cand" >/dev/null 2>&1 \
              && "$cand" -c 'import sys; sys.exit(0 if sys.version_info >= (3, 10) else 1)'; then
              echo "cmd=$(command -v "$cand")" >> "$GITHUB_OUTPUT"
              echo "Using $($cand --version)"
              exit 0
            fi
          done
          echo "::error::No Python ≥3.10 found. Install: brew install python@3.11"
          exit 1

      - name: Install ping-luma
        # Pinned to a specific commit/tag in production. For first-run
        # convenience this fetches the latest main; you can pin a tag
        # with @v1.0.0 once you cut releases.
        shell: bash
        run: |
          set -euo pipefail
          PY="${{ steps.py.outputs.cmd }}"
          "$PY" -m pip install --upgrade pip
          "$PY" -m pip install -r requirements.txt

      - name: Probe and write iran-ref.json
        shell: bash
        run: |
          set -euo pipefail
          PY="${{ steps.py.outputs.cmd }}"
          "$PY" -m ping_luma.publish_iran_reference \
              --output iran-ref.json \
              --pretty

      # ``git diff`` ignores *untracked* files. On the first-ever run there is
      # no committed ``iran-ref.json`` yet — the old ``git diff --quiet
      # iran-ref.json`` check always succeeded, skipped commit, and left the
      # repo without the file (raw.githubusercontent.com → 404 forever).
      - name: Commit and push if changed
        run: |
          set -e
          git add iran-ref.json
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
            exit 0
          fi
          git config user.email "iran-ref-bot@users.noreply.github.com"
          git config user.name  "iran-ref-bot"
          git commit -m "iran-ref: refresh $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push

name: iran-reference-probe

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: { }

permissions:
  contents: write

concurrency:
  group: iran-reference-probe
  cancel-in-progress: false

jobs:
  probe:
    runs-on: self-hosted
    timeout-minutes: 8

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Resolve Python (self-hosted)
        id: py
        shell: bash
        run: |
          set -euo pipefail
          for cand in python3.12 python3.11 python3.10 python3; do
            if command -v "$cand" >/dev/null 2>&1 \
              && "$cand" -c 'import sys; sys.exit(0 if sys.version_info >= (3, 10) else 1)'; then
              echo "cmd=$(command -v "$cand")" >> "$GITHUB_OUTPUT"
              echo "Using $($cand --version)"
              exit 0
            fi
          done
          echo "::error::No Python ≥3.10 found. Install: brew install python@3.11"
          exit 1

      - name: Install ping-luma
        shell: bash
        run: |
          set -euo pipefail
          PY="${{ steps.py.outputs.cmd }}"

          # Create a virtual environment inside the workspace
          "$PY" -m venv "$GITHUB_WORKSPACE/.venv"

          # Activate and upgrade pip cleanly
          source "$GITHUB_WORKSPACE/.venv/bin/activate"
          pip install --upgrade pip
          pip install -r requirements.txt

          # Save the venv python path for all subsequent steps
          echo "VENV_PY=$GITHUB_WORKSPACE/.venv/bin/python" >> "$GITHUB_ENV"

      - name: Probe and write iran-ref.json
        shell: bash
        run: |
          set -euo pipefail
          "$VENV_PY" -m ping_luma.publish_iran_reference \
              --output iran-ref.json \
              --pretty

      - name: Commit and push if changed
        shell: bash
        run: |
          set -e
          git add iran-ref.json
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
            exit 0
          fi
          git config user.email "iran-ref-bot@users.noreply.github.com"
          git config user.name  "iran-ref-bot"
          git commit -m "iran-ref: refresh $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
